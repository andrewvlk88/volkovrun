
version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes: ["./backend:/app","./tokens:/app/tokens"]
    env_file: ./backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
    volumes: ["./frontend:/app","/app/node_modules"]
    command: npm run dev -- --host
